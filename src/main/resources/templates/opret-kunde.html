<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Opret kunde</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<div th:replace="~{fragments/sidebar :: sidebar}">
</div>

<div class="content">

    <h1>Opret kunde</h1>

    <form th:action="@{/kunder/gem}"
          th:object="${customer}"
          method="post">

        <input
                type="text"
                th:field="*{name}"
                placeholder="Navn"
                required>

        <input
                type="email"
                th:field="*{email}"
                placeholder="Email"
                pattern="^[^@]+@[^@]+\.[^@]+$"
                title="Email skal indeholde @ og punktum"
                required>

        <input
                type="text"
                th:field="*{phone}"
                placeholder="Telefon"
                pattern="[0-9]{8}"
                title="Telefonnummer skal være præcis 8 tal"
                required>

        <button type="submit">
            Gem
        </button>

    </form>

</div>

</body>
</html>
