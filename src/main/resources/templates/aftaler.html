<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Aftaler</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<div th:replace="~{fragments/sidebar::sidebar}"></div>

<div class="content">

    <div class="topbar">
        <h1>Bil Reservationer</h1>

        <a th:href="@{/aftaler/opret}">
            <button>Opret Aftale</button>
        </a>
    </div>

    <table>

        <tr>
            <th>Kunde ID</th>
            <th>Bil ID</th>
            <th>Start dato</th>
            <th>Slut dato</th>
            <th>Pris</th>
        </tr>

        <th:block th:each="agreement, stat : ${agreements}">

            <tr>
                <td th:text="${agreement.customerId}"></td>
                <td th:text="${agreement.carId}"></td>
                <td th:text="${agreement.startDate}"></td>
                <td th:text="${agreement.endDate}"></td>
                <td th:text="${agreement.rentalPrice}"></td>

                <td>

                    <button th:if="${!agreement.settled}"
                            th:onclick="'document.getElementById(\'calc-' + ${stat.index} + '\').style.display=\'table-row\''">
                        Beregn overkørsel
                    </button>

                    <span th:if="${agreement.settled}"
                          th:text="${agreement.totalPrice + ' kr.'}">
                    </span>

                </td>
            </tr>

            <tr th:id="'calc-' + ${stat.index}" style="display:none;">
                <td colspan="6">

                    <form th:action="@{/aftaler/afregn/{id}(id=${agreement.id})}"
                          method="post">

                        <input type="number"
                               name="paidKilometers"
                               placeholder="Kilometer betalt for">

                        <input type="number"
                               name="drivenKilometers"
                               placeholder="Kilometer kørt i alt">

                        <button type="submit">Afregn Nu</button>

                        <button type="button"
                                th:onclick="'document.getElementById(\'calc-' + ${stat.index} + '\').style.display=\'none\''">
                            Annuller
                        </button>

                    </form>

                </td>
            </tr>

        </th:block>

    </table>

</div>

</body>
</html>
