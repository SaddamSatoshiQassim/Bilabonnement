<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Aftaler</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<div th:replace="~{fragments/sidebar::sidebar}"></div>

<div class="content">

    <div class="topbar">
        <h1>Bil Reservationer</h1>

        <a th:href="@{/aftaler/opret}">
            <button type="button">Opret Aftale</button>
        </a>
    </div>

    <table>
        <thead>
        <tr>
            <th>Kunde ID</th>
            <th>Bil ID</th>
            <th>Start dato</th>
            <th>Slut dato</th>
            <th>Afhentning</th>
            <th>Aflevering</th>
            <th>Pris</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="agreement : ${agreements}">
            <td th:text="${agreement.customerId}"></td>
            <td th:text="${agreement.carId}"></td>
            <td th:text="${agreement.startDate}"></td>
            <td th:text="${agreement.endDate}"></td>
            <td th:text="${agreement.pickupLocation != null ? agreement.pickupLocation.name : ''}"></td>
            <td th:text="${agreement.returnLocation != null ? agreement.returnLocation.name : ''}"></td>
            <td th:text="${agreement.rentalPrice}"></td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
