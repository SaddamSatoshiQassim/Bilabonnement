<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Opret aftale</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<div th:replace="~{fragments/sidebar::sidebar}"></div>

<div class="content">

    <div class="topbar">
        <h1>Opret bil reservation</h1>
        <a th:href="@{/aftaler}">
            <button type="button">← Tilbage</button>
        </a>
    </div>

    <form th:action="@{/aftaler/gem}" method="post">

        <label>Vælg kunde</label>
        <select name="customerId" required>
            <option value="">-- Vælg kunde --</option>
            <option th:each="customer : ${customers}"
                    th:value="${customer.id}"
                    th:text="${customer.name}">
            </option>
        </select>

        <label>Start dato</label>
        <input type="date" name="startDate" id="startDate" required>

        <label>Slut dato</label>
        <input type="date" name="endDate" id="endDate" required>

        <label>Vælg bil</label>
        <select name="carId" id="carSelect" required>
            <option value="">-- Vælg bil --</option>
            <option th:each="car : ${cars}"
                    th:value="${car.id}"
                    th:data-price="${car.basePrice}"
                    th:text="${car.brand + ' ' + car.model + ' - ' + car.basePrice + ' kr/dag'}">
            </option>
        </select>

        <label>Afhentningssted</label>
        <input type="text"
               name="pickupLocation.name"
               placeholder="Fx København"
               required>

        <label>Afleveringssted</label>
        <input type="text"
               name="returnLocation.name"
               placeholder="Fx Aarhus"
               required>

        <label>Pris</label>
        <input type="text"
               id="pricePreview"
               value="Vælg bil og datoer"
               readonly>

        <div style="display:flex; gap:10px; margin-top:20px;">

            <button type="submit">Gem</button>

            <a th:href="@{/aftaler}">
                <button type="button">Cancel</button>
            </a>

        </div>

    </form>

</div>

<script>
    const carSelect = document.getElementById("carSelect");
    const startDate = document.getElementById("startDate");
    const endDate = document.getElementById("endDate");
    const pricePreview = document.getElementById("pricePreview");

    function calculatePrice() {
        const selectedCar = carSelect.options[carSelect.selectedIndex];

        if (!selectedCar || !selectedCar.dataset.price || !startDate.value || !endDate.value) {
            pricePreview.value = "Vælg bil og datoer";
            return;
        }

        const pricePerDay = Number(selectedCar.dataset.price);
        const start = new Date(startDate.value);
        const end = new Date(endDate.value);

        let days = Math.ceil((end - start) / (1000 * 60 * 60 * 24));

        if (days <= 0) {
            days = 1;
        }

        const total = pricePerDay * days;

        pricePreview.value = total + " kr";
    }

    carSelect.addEventListener("change", calculatePrice);
    startDate.addEventListener("change", calculatePrice);
    endDate.addEventListener("change", calculatePrice);
</script>

</body>
</html>
