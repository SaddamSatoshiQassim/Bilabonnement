<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Opret aftale</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>
<div th:replace="~{fragments/sidebar::sidebar}"></div>

<div class="content">
    <div class="topbar">
        <h1>Opret bil reservation</h1>
        <a th:href="@{/aftaler}"><button type="button">← Tilbage</button></a>
    </div>

    <form th:action="@{/aftaler/gem}" method="post">

        <label>Vaelg kunde</label>

        <select name="customerId" required>
            <option value="">-- Vælg kunde --</option>

            <option th:each="customer : ${customers}"
                    th:value="${customer.id}"
                    th:text="${customer.id + ' - ' + customer.name}">
            </option>
        </select>

        <label>Start dato</label>
        <input type="date"
               name="startDate">

        <label>Slut dato</label>
        <input type="date"
               name="endDate">

        <label>Vælg bil</label>

        <select name="carId">

            <option
                    th:each="car : ${cars}"
                    th:value="${car.id}"
                    th:text="${car.brand + ' ' + car.model}">
            </option>

        </select>

        <label>Pris</label>

        <input type="text"
               value="Auto genereres"
               disabled>

        <div style="display:flex; gap:10px; margin-top:20px;">

            <button type="submit">
                Gem
            </button>

            <a th:href="@{/aftaler}">
                <button type="button">
                    Cancel
                </button>
            </a>

        </div>

    </form>
</div>
</body>

</html>
