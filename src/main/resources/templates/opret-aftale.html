<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Opret aftale</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<div th:replace="~{fragments/sidebar::sidebar}"></div>

<div class="content">

    <div class="topbar">
        <h1>Opret bil reservation</h1>

        <a th:href="@{/aftaler}">
            <button type="button">← Tilbage</button>
        </a>
    </div>

    <form th:action="@{/aftaler/gem}" method="post">

        <p th:if="${errorMessage}"
           th:text="${errorMessage}"
           style="color:red;">
        </p>

        <label>Vælg kunde</label>
        <select name="customerId" required>
            <option value="">-- Vælg kunde --</option>
            <option th:each="customer : ${customers}"
                    th:value="${customer.id}"
                    th:text="${customer.name}">
            </option>
        </select>

        <label>Start dato</label>
        <input type="date"
               id="startDate"
               name="startDate"
               required>

        <label>Slut dato</label>
        <input type="date"
               id="endDate"
               name="endDate"
               required>

        <label>Vælg bil</label>

        <select name="carId" required>

            <option value="">-- Vælg bil --</option>

            <option th:each="car : ${cars}"
                    th:value="${car.id}"
                    th:text="${car.brand + ' ' + car.model + ' - ' + car.basePrice + ' kr/dag'}">
            </option>

        </select>

        <label>Afhentningssted</label>

        <input type="text"
               name="pickupLocation.name"
               placeholder="Fx København"
               required>

        <label>Afleveringssted</label>

        <input type="text"
               name="returnLocation.name"
               placeholder="Fx Aarhus"
               required>

        <div style="display:flex; gap:10px; margin-top:20px;">

            <button type="submit">
                Gem
            </button>

            <a th:href="@{/aftaler}">
                <button type="button">
                    Cancel
                </button>
            </a>

        </div>

    </form>

</div>

<script>
    const startDate = document.getElementById("startDate");
    const endDate = document.getElementById("endDate");

    startDate.addEventListener("change", function () {
        endDate.min = startDate.value;

        if (endDate.value && endDate.value < startDate.value) {
            endDate.value = startDate.value;
        }
    });
</script>

</body>
</html>
