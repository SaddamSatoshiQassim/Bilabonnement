<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Opret aftale</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<div th:replace="~{fragments/sidebar::sidebar}"></div>

<div class="content">

    <div class="topbar">
        <h1 th:text="${agreement.id == 0 ? 'Opret bil reservation' : 'Rediger bil reservation'}"></h1>

        <a th:href="@{/aftaler}">
            <button type="button">← Tilbage</button>
        </a>
    </div>

    <<form th:action="@{${agreement.id == 0 ? '/aftaler/gem' : '/aftaler/opdater'}}"
           th:object="${agreement}"
           method="post">

        <input type="hidden" th:field="*{id}">

        <label>Vælg kunde</label>
        <select th:field="*{customerId}" required>

            <option value="">-- Vælg kunde --</option>

            <option th:each="customer : ${customers}"
                    th:value="${customer.id}"
                    th:text="${customer.name}">
            </option>

        </select>

        <label>Start dato</label>
        <input type="date"
               th:field="*{startDate}"
               required>

        <label>Slut dato</label>
        <input type="date"
               th:field="*{endDate}"
               required>

        <label>Vælg bil</label>
        <select th:field="*{carId}" required>

            <option value="">-- Vælg bil --</option>

            <option th:each="car : ${cars}"
                    th:value="${car.id}"
                    th:text="${car.brand + ' ' + car.model + ' - ' + car.basePrice + ' kr/dag'}">
            </option>

        </select>

        <label>Afhentningssted</label>
        <input type="text"
               th:field="*{pickupLocation.name}"
               placeholder="Fx København"
               required>

        <label>Afleveringssted</label>
        <input type="text"
               th:field="*{returnLocation.name}"
               placeholder="Fx Aarhus"
               required>

        <div style="display:flex; gap:10px; margin-top:20px;">

            <button type="submit"
                    th:text="${agreement.id == 0 ? 'Gem' : 'Opdater'}">
            </button>

            <a th:href="@{/aftaler}">
                <button type="button">
                    Cancel
                </button>
            </a>

        </div>

    </form>

</div>

</body>
</html>
