<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Opret skaderapport</title>

    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<div th:replace="~{fragments/sidebar :: sidebar}">
</div>

<div class="content">

    <h1>Opret skaderapport</h1>

    <form th:action="@{/skader/gem}"
          th:object="${damageReport}"
          method="post">

        <!-- Fix til null-id fejl -->
        <input type="hidden" th:field="*{id}">

        <label>Lejeaftale</label>

        <select th:field="*{rentalId}" required>

            <option value="0">
                Vælg lejeaftale
            </option>

            <option th:each="rental : ${rentalAgreements}"
                    th:value="${rental.id}"
                    th:text="'Aftale #' + ${rental.id}
                    + ' - Kunde: ' + ${rental.customerName}
                    + ' - Bil: ' + ${rental.carModel}">
            </option>

        </select>

        <br><br>

        <label>Dato</label>

        <input type="date"
               th:field="*{reportDate}"
               required>

        <br><br>

        <label>Beskrivelse</label>

        <br>

        <textarea th:field="*{description}"
                  rows="4"
                  cols="50">
        </textarea>

        <br><br>

        <h2>Skader</h2>

        <label>
            <input type="checkbox"
                   name="damage"
                   value="Ridse i lak:1500">

            Ridse i lak - 1500 kr.
        </label>

        <br>

        <label>
            <input type="checkbox"
                   name="damage"
                   value="Bule i dør:2500">

            Bule i dør - 2500 kr.
        </label>

        <br>

        <label>
            <input type="checkbox"
                   name="damage"
                   value="Ødelagt sidespejl:3000">

            Ødelagt sidespejl - 3000 kr.
        </label>

        <br>

        <label>
            <input type="checkbox"
                   name="damage"
                   value="Stenslag i rude:1200">

            Stenslag i rude - 1200 kr.
        </label>

        <br><br>

        <button type="submit">
            Gem skaderapport
        </button>

    </form>

</div>

</body>
</html>
