<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Opret skade</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>

<body>

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="content">

    <div class="topbar">
        <h1>Opret skadesrapport</h1>

        <a th:href="@{/skader}">
            <button type="button">← Tilbage</button>
        </a>
    </div>

    <form th:action="@{/skader/gem}" method="post">

        <input type="hidden" name="id" value="0">

        <label>Vælg bil</label>

        <select name="carId" required>
            <option value="">-- Vælg bil --</option>

            <option th:each="car : ${cars}"
                    th:value="${car.id}"
                    th:text="${car.brand + ' ' + car.model + ' - ' + car.vin}">
            </option>
        </select>

        <label>Vælg skader</label>

        <div class="checkboxes">

            <label>
                <input type="checkbox" name="damage" value="Bule skade:500">
                Bule skade (500 kr)
            </label>

            <label>
                <input type="checkbox" name="damage" value="Ridse:200">
                Ridse (200 kr)
            </label>

            <label>
                <input type="checkbox" name="damage" value="Ødelagt lygte:800">
                Ødelagt lygte (800 kr)
            </label>

        </div>

        <label>Beskrivelse</label>
        <textarea name="description" required></textarea>

        <label>Dato</label>
        <input type="date" name="reportDate" required>

        <label>Total pris</label>
        <input type="text" value="Beregnes når skaden gemmes" disabled>

        <div style="display:flex; gap:10px; margin-top:20px;">
            <button type="submit">Gem skade</button>

            <a th:href="@{/skader}">
                <button type="button">Cancel</button>
            </a>
        </div>

    </form>

</div>

</body>
</html>
